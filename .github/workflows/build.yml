name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
      pull-requests: write
      
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Read/Write Properties File
      uses: kurt-code/gha-properties@v0.0.2
      id: read-properties
      with:
        operation: 'read'
        file-path: 'version.properties'
        keys: 'grokexporter.version'

    - name: Get branch name
      id: branch-names
      uses: tj-actions/branch-names@v9

    - name: Get the Read properties
      run: |
        echo "version: ${{ steps.read-properties.outputs.grokexporter_version }}"
        echo "github.ref: ${{ github.ref }}"
        echo "branch: ${{ steps.branch-names.outputs.current_branch }}"

    - name: Build Dockerfile 
      uses: docker/build-push-action@v2
      with:
        tags: grokexporter-builder:latest
        push: false

    - name: Ensure git submodules initialised correctly
      run: |
        git submodule update --init --recursive

    - name: Build using Dockerfile
      uses: addnab/docker-run-action@v3
      with:
        image: grokexporter-builder:latest
        options: -e VERSION=${{ steps.read-properties.outputs.grokexporter_version }} -e BRANCH=${{ steps.branch-names.outputs.current_branch }} --mount type=bind,source=${{ github.workspace }},target=/workspace
        run: |
            ls -l /workspace
            /workspace/hack/release.sh $VERSION $BRANCH /workspace/dist          
            ls -l /workspace/dist
    - name: Check output
      run: |
        echo "workspace: ${{ github.workspace }}"
        ls -l ${{ github.workspace }}
        ls -l ${{ github.workspace }}/dist

    - name: Ensure git submodules initialised correctly
      run: |
        git submodule update --init --recursive

    - name: "Create Release"
      id: create_release
      uses: softprops/action-gh-release@v3.0.0
      if: startsWith(github.ref, 'refs/tags/') && endsWith(github.ref, steps.read-properties.outputs.grokexporter_version)
      with:
        tag_name: ${{ steps.read-properties.outputs.grokexporter_version }}
        name: Release ${{ steps.read-properties.outputs.grokexporter_version }}
        body_path: CHANGELOG.md
        token: ${{ secrets.RELEASE_TOKEN }}
        files: ${{ github.workspace }}/dist/grok_exporter-${{ steps.read-properties.outputs.grokexporter_version }}.linux-amd64.zip